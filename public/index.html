<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base62 URL Shortener</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        /* Custom glassmorphism effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Loading spinner animation */
        .loader {
            border-top-color: transparent;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="min-h-screen text-white flex items-center justify-center p-4">

    <div class="glass-card rounded-2xl shadow-2xl p-8 max-w-lg w-full transform transition-all duration-300 hover:shadow-indigo-500/20">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 mb-4 ring-1 ring-indigo-500/50">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Trim Your Links</h1>
            <p class="text-slate-400">Paste your long URL below to create a concise, memorable short link instantly.</p>
        </div>

        <!-- Form -->
        <form id="shorten-form" class="space-y-4">
            <div class="relative">
                <input 
                    type="url" 
                    id="url-input" 
                    placeholder="https://example.com/very/long/path..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    required
                >
            </div>
            
            <button 
                type="submit" 
                id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl px-4 py-4 transition-colors flex items-center justify-center gap-2"
            >
                <span>Shorten URL</span>
                <div id="loading-spinner" class="hidden w-5 h-5 border-2 border-white rounded-full loader"></div>
            </button>
        </form>

        <!-- Error Message Container -->
        <div id="error-message" class="hidden mt-4 p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm text-center">
            <!-- Dynamic error goes here -->
        </div>

        <!-- Success Result Container -->
        <div id="result-container" class="hidden mt-6 pt-6 border-t border-slate-700/50">
            <p class="text-sm font-medium text-slate-400 mb-2">Your shortened URL is ready:</p>
            <div class="flex items-center gap-2 bg-slate-900/50 border border-slate-700 rounded-xl p-2">
                <input 
                    type="text" 
                    id="short-url-display" 
                    class="flex-1 bg-transparent border-none focus:outline-none text-indigo-400 font-semibold px-2" 
                    readonly
                >
                <button 
                    id="copy-btn" 
                    class="bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-lg transition-colors flex items-center gap-2"
                    title="Copy to clipboard"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    <span id="copy-text" class="text-sm font-medium pr-1">Copy</span>
                </button>
            </div>
        </div>

    </div>

    <script>
        const form = document.getElementById('shorten-form');
        const urlInput = document.getElementById('url-input');
        const submitBtn = document.getElementById('submit-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const btnText = submitBtn.querySelector('span');
        
        const resultContainer = document.getElementById('result-container');
        const shortUrlDisplay = document.getElementById('short-url-display');
        const copyBtn = document.getElementById('copy-btn');
        const copyText = document.getElementById('copy-text');
        
        const errorContainer = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const originalUrl = urlInput.value.trim();
            if (!originalUrl) return;

            // Reset UI states
            errorContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');
            btnText.textContent = 'Processing...';
            loadingSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                // Call our Express Microservice!
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: originalUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to shorten URL');
                }

                // Show success UI
                shortUrlDisplay.value = data.short_url;
                resultContainer.classList.remove('hidden');
                
                // Clear input for the next one
                urlInput.value = '';

            } catch (error) {
                // Show custom error box
                errorContainer.textContent = error.message;
                errorContainer.classList.remove('hidden');
            } finally {
                // Restore button state
                btnText.textContent = 'Shorten URL';
                loadingSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Copy to clipboard logic using the legacy fallback for maximum browser/iframe support
        copyBtn.addEventListener('click', () => {
            shortUrlDisplay.select();
            shortUrlDisplay.setSelectionRange(0, 99999); // For mobile devices

            try {
                document.execCommand('copy');
                
                // Visual feedback
                copyText.textContent = 'Copied!';
                copyBtn.classList.add('text-emerald-400');
                
                setTimeout(() => {
                    copyText.textContent = 'Copy';
                    copyBtn.classList.remove('text-emerald-400');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
            
            // Deselect text
            window.getSelection().removeAllRanges();
        });
    </script>
</body>
</html>
